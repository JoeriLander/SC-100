<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>SC-100 Studieplan</title>
<style>
:root{
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-m:#378ADD;--blue-d:#0C447C;
  --green:#3B6D11;--green-l:#EAF3DE;--green-d:#27500A;--green-m:#639922;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-d:#633806;
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --teal:#0F6E56;--teal-l:#E1F5EE;--teal-d:#085041;
  --coral:#993C1D;--coral-l:#FAECE7;--coral-d:#712B13;
  --gray:#5F5E5A;--gray-l:#F1EFE8;--gray-m:#D3D1C7;
  --text:#1a1a1a;--muted:#5F5E5A;--faint:#888780;
  --border:rgba(0,0,0,0.08);--surface:#fff;--bg:#F5F4F1;
  --r:14px;--rs:10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  font-size:15px;line-height:1.55;
  padding-top:calc(120px + var(--safe-top));
  padding-bottom:calc(24px + var(--safe-bottom));
  min-height:100vh;
}

/* ── Sticky top bar ── */
.sticky-top{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:calc(10px + var(--safe-top)) 16px 10px;
}
.sticky-inner{max-width:600px;margin:0 auto;}
.sticky-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sticky-title{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.sticky-pct{font-size:22px;font-weight:700;color:var(--blue);}
.prog-bar-wrap{height:7px;background:var(--gray-l);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.prog-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease;width:0%;background:linear-gradient(90deg,var(--blue-m),var(--green-m));}
.week-dots{display:flex;gap:5px;flex-wrap:wrap;}
.week-dot{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
  border:2px solid transparent;
  cursor:pointer;transition:all 0.15s;
  min-width:30px;
}
.week-dot:active{transform:scale(0.9);}

/* ── Page content ── */
.page{max-width:600px;margin:0 auto;padding:0 12px;}

/* ── LP overview ── */
.lp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.lp-card{border-radius:var(--rs);padding:10px 12px;border-left:3px solid;}
.lp-card-title{font-size:12px;font-weight:700;margin-bottom:1px;line-height:1.3;}
.lp-card-sub{font-size:10px;opacity:0.7;}

.slabel{font-size:10px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:var(--faint);margin:16px 0 8px;}

/* ── Week blocks ── */
.week-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.week-block.complete{border-color:rgba(99,153,34,0.5);}

.week-hdr{
  display:flex;align-items:center;gap:12px;
  padding:14px 14px;
  cursor:pointer;user-select:none;
  min-height:64px;
  -webkit-user-select:none;
}
.week-hdr:active{background:var(--bg);}

.week-badge{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex-shrink:0;
  position:relative;
}
.done-check{
  position:absolute;bottom:-2px;right:-2px;
  width:16px;height:16px;border-radius:50%;
  background:var(--green-m);
  display:none;align-items:center;justify-content:center;
}
.done-check::after{
  content:'';width:8px;height:5px;
  border-left:2px solid #fff;border-bottom:2px solid #fff;
  transform:rotate(-45deg);margin-top:-1px;display:block;
}
.week-block.complete .done-check{display:flex;}

.week-info{flex:1;min-width:0;}
.week-title{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:3px;}
.week-meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.week-hours{font-size:11px;color:var(--muted);}
.phase-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}

.week-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.mini-prog-wrap{text-align:right;}
.mini-prog{font-size:12px;font-weight:600;color:var(--muted);}
.mini-bar{width:44px;height:4px;background:var(--gray-l);border-radius:2px;overflow:hidden;margin-top:3px;}
.mini-bar-fill{height:100%;border-radius:2px;transition:width 0.3s;}
.chev{font-size:12px;color:var(--faint);transition:transform 0.25s;margin-top:4px;}
.chev.open{transform:rotate(180deg);}

/* ── Week body ── */
.week-body{display:none;border-top:1px solid var(--border);}
.week-body.open{display:block;}

/* Tabs inside week */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:1;min-width:80px;padding:10px 8px;
  font-size:12px;font-weight:600;color:var(--muted);
  background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;
  transition:all 0.15s;
}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue-m);background:var(--surface);}
.tab-btn:active{background:var(--gray-l);}

.tab-panel{display:none;padding:14px;}
.tab-panel.active{display:block;}

/* Milestone flag */
.mflag{display:inline-flex;align-items:center;gap:5px;background:var(--coral-l);color:var(--coral-d);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;margin-bottom:10px;}

/* NEW badge */
.new-badge{display:inline-flex;background:#EAF3DE;color:#27500A;border-radius:8px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:4px;vertical-align:middle;font-style:normal;white-space:nowrap;}

/* Checklist */
.cl-section{margin-bottom:14px;}
.cl-section:last-child{margin-bottom:0;}
.cl-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.cl-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.cl-section-prog{font-size:11px;font-weight:600;color:var(--faint);}

.cl-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  min-height:48px;
}
.cl-item:last-child{border-bottom:none;}
.cl-item:active{background:var(--gray-l);margin:0 -14px;padding-left:14px;padding-right:14px;}

.cl-cb{
  width:24px;height:24px;border-radius:7px;
  border:2px solid var(--gray-m);background:var(--surface);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;margin-top:0px;
}
.cl-cb.checked{background:var(--green-m);border-color:var(--green-m);}
.cl-cb.checked::after{
  content:'';width:12px;height:8px;
  border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;
  transform:rotate(-45deg);margin-top:-2px;display:block;
}
.cl-label{font-size:14px;line-height:1.45;flex:1;padding-top:1px;}
.cl-label.striked{color:var(--faint);text-decoration:line-through;}

/* Module tab */
.mod-card{background:var(--bg);border-radius:var(--rs);padding:12px;margin-bottom:10px;}
.mod-card:last-child{margin-bottom:0;}
.mod-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.mod-badge-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;flex-shrink:0;margin-top:1px;}
.mod-name{font-size:13px;font-weight:600;line-height:1.4;flex:1;}
.mod-lp{font-size:10px;font-weight:600;margin-bottom:4px;}
.mod-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.mod-focus{font-size:11px;font-style:italic;padding:6px 9px;border-radius:7px;line-height:1.5;}
.mod-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;margin-top:8px;text-decoration:none;padding:6px 10px;border-radius:8px;}

/* Info cards */
.info-cards{display:grid;grid-template-columns:1fr;gap:8px;}
.info-card{border-radius:var(--rs);padding:10px 12px;}
.info-card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;opacity:0.65;}
.info-card-txt{font-size:13px;line-height:1.55;}

.skip-note{background:var(--gray-l);border-radius:var(--rs);padding:8px 11px;font-size:12px;color:var(--gray);font-style:italic;margin-top:8px;}

/* Reset button */
.reset-wrap{text-align:center;margin-top:24px;padding-bottom:8px;}
.reset-btn{background:none;border:1px solid var(--gray-m);border-radius:20px;padding:8px 20px;font-size:12px;color:var(--muted);cursor:pointer;}
.reset-btn:active{background:var(--gray-l);}

footer{text-align:center;font-size:11px;color:var(--faint);margin-top:16px;padding-bottom:8px;}
</style>
</head>

// ── Storage ──
const STORAGE_KEY='sc100_v4';
function load(){try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):{}}catch(e){return{}}}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
let state=load();

function isChecked(id){return state[id]===true;}
function toggle(id){
  state[id]=!state[id];
  save();
  updateItem(id);
  updateWeekProgress();
  updateTotal();
}

// ── Progress helpers ──
function weekDone(w){let t=0,d=0;w.checklists.forEach(cl=>cl.items.forEach(i=>{t++;if(isChecked(i.id))d++;}));return{t,d};}
function totalDone(){let t=0,d=0;WEEKS.forEach(w=>{const p=weekDone(w);t+=p.t;d+=p.d;});return{t,d};}

// ── Targeted DOM updates (fast on mobile) ──
function updateItem(id){
  const cb=document.getElementById('cb-'+id);
  const lbl=document.getElementById('lbl-'+id);
  const checked=isChecked(id);
  if(cb){if(checked)cb.classList.add('checked');else cb.classList.remove('checked');}
  if(lbl){if(checked)lbl.classList.add('striked');else lbl.classList.remove('striked');}
}

function updateWeekProgress(){
  WEEKS.forEach(w=>{
    const p=weekDone(w);
    const block=document.getElementById('wb-'+w.num);
    const mp=document.getElementById('mp-'+w.num);
    const mbar=document.getElementById('mbar-'+w.num);
    const dot=document.getElementById('dot-'+w.num);
    if(block){if(p.d===p.t&&p.t>0)block.classList.add('complete');else block.classList.remove('complete');}
    if(mp)mp.textContent=p.d+'/'+p.t;
    if(mbar)mbar.style.width=(p.t>0?Math.round(p.d/p.t*100):0)+'%';

    // dot styling
    if(dot){
      if(p.d===p.t&&p.t>0){dot.style.background=w.pc;dot.style.color='#fff';dot.style.borderColor=w.pc;}
      else if(p.d>0){dot.style.background='transparent';dot.style.color=w.pc;dot.style.borderColor=w.pc;}
      else{dot.style.background=w.pb;dot.style.color=w.pc;dot.style.borderColor=w.pc+'50';}
    }

    // section progress
    w.checklists.forEach((cl,ci)=>{
      const el=document.getElementById('clp-'+w.num+'-'+ci);
      if(el){const dn=cl.items.filter(i=>isChecked(i.id)).length;el.textContent=dn+'/'+cl.items.length;}
    });
  });
}

function updateTotal(){
  const p=totalDone();
  const pct=p.t>0?Math.round(p.d/p.t*100):0;
  document.getElementById('totalBar').style.width=pct+'%';
  document.getElementById('totalPct').textContent=pct+'%';
}

// ── Tab switching ──
function switchTab(wNum,ti){
  const panels=document.querySelectorAll('.tp-'+wNum);
  const btns=document.querySelectorAll('.tb-'+wNum);
  panels.forEach((p,i)=>{if(i===ti)p.classList.add('active');else p.classList.remove('active');});
  btns.forEach((b,i)=>{if(i===ti)b.classList.add('active');else b.classList.remove('active');});
}

// ── Toggle week ──
function toggleWeek(num){
  const body=document.getElementById('wbody-'+num);
  const chev=document.getElementById('wchev-'+num);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

// ── Scroll to week ──
function scrollToWeek(num){
  const el=document.getElementById('wb-'+num);
  if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'start'});
  setTimeout(()=>{
    const body=document.getElementById('wbody-'+num);
    const chev=document.getElementById('wchev-'+num);
    if(body&&!body.classList.contains('open')){body.classList.add('open');chev.classList.add('open');}
  },300);
}

// ── Reset ──
function confirmReset(){
  if(confirm('Weet je zeker dat je alle voortgang wilt wissen?')){
    Object.keys(state).forEach(k=>delete state[k]);
    save();
    WEEKS.forEach(w=>w.checklists.forEach(cl=>cl.items.forEach(i=>{updateItem(i.id);})));
    updateWeekProgress();
    updateTotal();
  }
}

// ── Render ──
function render(){
  // Dots
  document.getElementById('weekDots').innerHTML=WEEKS.map(w=>
    `<div class="week-dot" id="dot-${w.num}" onclick="scrollToWeek(${w.num})" title="Week ${w.num}" style="background:${w.pb};color:${w.pc};border-color:${w.pc}50;">W${w.num}</div>`
  ).join('');

  // Weeks
  document.getElementById('weeks').innerHTML=WEEKS.map(w=>{
    // Tabs: always Actielijst, then Modules if any, then Info
    const hasMods=w.modules.length>0;
    const tabs=[{id:'checklist',label:'Actielijst'}];
    if(hasMods)tabs.push({id:'modules',label:'Modules'+(w.modules.some(m=>m.isNew)?' ✦':'')});
    tabs.push({id:'info',label:'Info'});

    const tabBtns=tabs.map((t,i)=>`<button class="tab-btn tb-${w.num}${i===0?' active':''}" onclick="switchTab(${w.num},${i})">${t.label}</button>`).join('');

    // Checklist panel
    const checklistPanel=`<div class="tab-panel tp-${w.num} active">
      ${w.milestone?`<div class="mflag">&#127919; ${w.milestone}</div>`:''}
      ${w.checklists.map((cl,ci)=>`
        <div class="cl-section">
          <div class="cl-section-hdr">
            <span class="cl-section-title">${cl.title}</span>
            <span class="cl-section-prog" id="clp-${w.num}-${ci}">0/${cl.items.length}</span>
          </div>
          ${cl.items.map(item=>`
            <div class="cl-item" onclick="toggle('${item.id}')">
              <div class="cl-cb" id="cb-${item.id}"></div>
              <span class="cl-label" id="lbl-${item.id}">${item.text}${item.isNew?'<span class="new-badge">NIEUW</span>':''}</span>
            </div>`).join('')}
        </div>`).join('')}
    </div>`;

    // Modules panel
    const modulesPanel=hasMods?`<div class="tab-panel tp-${w.num}">
      ${w.modules.map(m=>{
        const lp=LP[m.lp];
        return`<div class="mod-card">
          <div class="mod-top">
            <span class="mod-badge-tag" style="background:${lp.bg};color:${lp.d};">${m.badge}</span>
            <span class="mod-name">${m.name}${m.isNew?'<span class="new-badge">NIEUW APR 2026</span>':''}</span>
          </div>
          <div class="mod-lp" style="color:${lp.c};">${lp.l}</div>
          <div class="mod-desc">${m.desc}</div>
          <div class="mod-focus" style="background:${lp.bg};color:${lp.d};">${m.focus}</div>
          <a href="${m.url}" class="mod-link" style="background:${lp.bg};color:${lp.d};" target="_blank">Openen in Microsoft Learn &#8599;</a>
        </div>`;
      }).join('')}
    </div>`:'';

    // Info panel
    const infoPanel=`<div class="tab-panel tp-${w.num}">
      ${w.skip?`<div class="skip-note">Wat je kunt overslaan: ${w.skip}</div>`:''}
      <div class="info-cards" style="margin-top:${w.skip?'10px':'0'};">
        <div class="info-card" style="background:#E6F1FB;">
          <div class="info-card-lbl" style="color:#0C447C;">Extra lezen</div>
          <div class="info-card-txt" style="color:#185FA5;">${w.extra}</div>
        </div>
        <div class="info-card" style="background:#EAF3DE;">
          <div class="info-card-lbl" style="color:#27500A;">Checkpoint</div>
          <div class="info-card-txt" style="color:#3B6D11;">${w.checkpoint}</div>
        </div>
      </div>
    </div>`;

    const panels=[checklistPanel];
    if(hasMods)panels.push(modulesPanel);
    panels.push(infoPanel);

    const p=weekDone(w);
    const pct=p.t>0?Math.round(p.d/p.t*100):0;

    return`<div class="week-block" id="wb-${w.num}">
      <div class="week-hdr" onclick="toggleWeek(${w.num})">
        <div class="week-badge" style="background:${w.pb};color:${w.pc};">
          <div class="done-check"></div>
          W${w.num}
        </div>
        <div class="week-info">
          <div class="week-title">${w.title}</div>
          <div class="week-meta-row">
            <span class="week-hours">${w.hours}</span>
            <span class="phase-pill" style="background:${w.pb};color:${w.pc};">${w.phase}</span>
          </div>
        </div>
        <div class="week-right">
          <div class="mini-prog-wrap">
            <div class="mini-prog" id="mp-${w.num}">0/${p.t}</div>
            <div class="mini-bar"><div class="mini-bar-fill" id="mbar-${w.num}" style="width:${pct}%;background:${w.pc};"></div></div>
          </div>
          <div class="chev" id="wchev-${w.num}">&#9660;</div>
        </div>
      </div>
      <div class="week-body" id="wbody-${w.num}">
        <div class="tab-bar">${tabBtns}</div>
        ${panels.join('')}
      </div>
    </div>`;
  }).join('');

  // Apply saved state to all items
  WEEKS.forEach(w=>w.checklists.forEach(cl=>cl.items.forEach(i=>updateItem(i.id))));
  updateWeekProgress();
  updateTotal();
}

render();
</script>
</body>
</html>
